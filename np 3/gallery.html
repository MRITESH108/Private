<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>गैलरी | नगर पंचायत</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- GLightbox -->
    <link href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- =========================
        PAGE HEADER
========================= -->

<section class="page-header">

    <div class="container text-center">

        <h1 data-aos="fade-down">गैलरी</h1>

        <nav class="breadcrumb justify-content-center" data-aos="fade-up">

            <a href="index.html">मुख्य पृष्ठ</a>
            <span>/</span>
            <span>गैलरी</span>

        </nav>

    </div>

</section>

<!-- =========================
        GALLERY SECTION
========================= -->

<section class="gallery-section py-5">

    <div class="container">

        <!-- Title -->

        <div class="section-title text-center mb-4" data-aos="fade-up">

            <span class="section-tag">हमारी गैलरी</span>

            <h2>फोटो एवं वीडियो संग्रह</h2>

            <p>नगर पंचायत के विकास कार्य, कार्यक्रम और गतिविधियाँ</p>

        </div>

        <!-- FILTER BUTTONS -->

        <div class="text-center mb-4" data-aos="fade-up">

            <button class="btn btn-filter active" onclick="filterGallery('all')">सभी</button>
            <button class="btn btn-filter" onclick="filterGallery('photo')">फोटो</button>
            <button class="btn btn-filter" onclick="filterGallery('video')">वीडियो</button>

        </div>

        <!-- ================= PHOTO ================= -->

        <div class="row g-3 gallery-item-box">

            <div class="col-lg-4 col-md-6 gallery-item photo" data-aos="zoom-in">

                <a href="images/gallery/1.jpg" class="glightbox">

                    <img src="images/gallery/1.jpg" class="img-fluid" alt="">

                    <div class="overlay"><i class="bi bi-zoom-in"></i></div>

                </a>

            </div>

            <div class="col-lg-4 col-md-6 gallery-item photo" data-aos="zoom-in" data-aos-delay="100">

                <a href="images/gallery/2.jpg" class="glightbox">

                    <img src="images/gallery/2.jpg" class="img-fluid" alt="">

                    <div class="overlay"><i class="bi bi-zoom-in"></i></div>

                </a>

            </div>

            <div class="col-lg-4 col-md-6 gallery-item photo" data-aos="zoom-in" data-aos-delay="200">

                <a href="images/gallery/3.jpg" class="glightbox">

                    <img src="images/gallery/3.jpg" class="img-fluid" alt="">

                    <div class="overlay"><i class="bi bi-zoom-in"></i></div>

                </a>

            </div>

            <!-- ================= VIDEO ================= -->

            <div class="col-lg-6 col-md-6 gallery-item video" data-aos="fade-up">

                <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" class="glightbox">

                    <img src="images/gallery/video1.jpg" class="img-fluid" alt="">

                    <div class="overlay video-overlay">

                        <i class="bi bi-play-circle-fill"></i>

                    </div>

                </a>

                <h5 class="text-center mt-2">स्वच्छता अभियान</h5>

            </div>

            <div class="col-lg-6 col-md-6 gallery-item video" data-aos="fade-up" data-aos-delay="100">

                <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" class="glightbox">

                    <img src="images/gallery/video2.jpg" class="img-fluid" alt="">

                    <div class="overlay video-overlay">

                        <i class="bi bi-play-circle-fill"></i>

                    </div>

                </a>

                <h5 class="text-center mt-2">नगर विकास कार्य</h5>

            </div>

        </div>

    </div>

</section>

<!-- =========================
        JS
========================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

<script>
AOS.init({ duration: 1000, once: true });

const lightbox = GLightbox({ selector: '.glightbox' });

function filterGallery(type){

    let items = document.querySelectorAll('.gallery-item');

    let buttons = document.querySelectorAll('.btn-filter');

    buttons.forEach(btn => btn.classList.remove('active'));

    event.target.classList.add('active');

    items.forEach(item => {

        if(type === 'all'){
            item.style.display = 'block';
        }
        else{
            if(item.classList.contains(type)){
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        }

    });
}
</script>

</body>
</html>
