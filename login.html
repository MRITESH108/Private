<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Login - Electra</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>

    <!-- Bootstrap -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Your Main CSS -->
    <link href="css/style.css" rel="stylesheet">

    <style>
        body{
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.65)),
                        url('img/commercial-1.jpg');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }

        .login-card{
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,.25);
            overflow: hidden;
        }

        .login-left{
            background: #0d6efd;
            color: white;
            padding: 50px;
        }

        .login-left h1{
            font-weight: 700;
        }

        .login-right{
            padding: 50px;
        }

        .form-control{
            height: 55px;
            border-radius: 10px;
        }

        .btn-login{
            height: 55px;
            border-radius: 10px;
            font-weight: 600;
        }

        .logo{
            font-size: 2rem;
            font-weight: bold;
            color: #0d6efd;
        }

        @media(max-width:768px){
            .login-left{
                display:none;
            }

            .login-right{
                padding:30px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">

        <div class="col-lg-10">
            <div class="login-card">

                <div class="row g-0">

                    <!-- Left Side -->
                    <div class="col-md-5">
                        <div class="login-left h-100 d-flex flex-column justify-content-center">
                            <h1><i class="fas fa-bolt"></i> Electra</h1>
                            <h4 class="mt-4">Welcome Back!</h4>
                            <p>
                                Access your dashboard and manage all your electrical
                                services in one place.
                            </p>

                            <div class="mt-4">
                                <i class="fas fa-check-circle me-2"></i>
                                Secure Login
                            </div>

                            <div class="mt-2">
                                <i class="fas fa-check-circle me-2"></i>
                                Fast Access
                            </div>

                            <div class="mt-2">
                                <i class="fas fa-check-circle me-2"></i>
                                24/7 Support
                            </div>
                        </div>
                    </div>

                    <!-- Right Side -->
                    <div class="col-md-7">
                        <div class="login-right">

                            <div class="text-center mb-4">
                                <h2 class="logo">
                                    <i class="fas fa-bolt"></i> Electra
                                </h2>
                                <p class="text-muted">
                                    Sign in to your account
                                </p>
                            </div>

                            <form action="dashboard.html" method="POST">

                                <div class="mb-3">
                                    <label>Email Address</label>
                                    <input type="email"
                                           class="form-control"
                                           placeholder="Enter your email"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label>Password</label>
                                    <input type="password"
                                           class="form-control"
                                           placeholder="Enter your password"
                                           required>
                                </div>

                                <div class="d-flex justify-content-between mb-4">
                                    <div>
                                        <input type="checkbox" id="remember">
                                        <label for="remember">
                                            Remember Me
                                        </label>
                                    </div>

                                    <a href="#" class="text-primary">
                                        Forgot Password?
                                    </a>
                                </div>

                                <button type="submit"
                                        class="btn btn-primary btn-login w-100">
                                    Login
                                </button>

                                <div class="text-center mt-4">
                                    <p>
                                        Don't have an account?
                                        <a href="register.html"
                                           class="text-primary fw-bold">
                                            Register
                                        </a>
                                    </p>
                                </div>

                            </form>

                            <div class="text-center mt-4">
                                <a href="index.html" class="btn btn-outline-secondary">
                                    ← Back to Home
                                </a>
                            </div>

                        </div>
                    </div>

                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
